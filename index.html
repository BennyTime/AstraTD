<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Astra TD</title>
    <style>
      :root {
        --bg: #050913;
        --panel: rgba(8, 12, 24, 0.75);
        --text: #d8f1ff;
        --accent: #46d4ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: radial-gradient(circle at 15% 15%, #0e1831 0%, var(--bg) 55%);
        color: var(--text);
        font-family: "Segoe UI", Tahoma, sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      #hud {
        position: absolute;
        top: 12px;
        left: 12px;
        padding: 10px 12px;
        background: var(--panel);
        border: 1px solid rgba(70, 212, 255, 0.35);
        border-radius: 10px;
        backdrop-filter: blur(4px);
        min-width: 180px;
        z-index: 10;
      }

      #hud h1 {
        margin: 0 0 8px;
        font-size: 14px;
        color: var(--accent);
        letter-spacing: 0.08em;
      }

      #hud p {
        margin: 4px 0;
        font-size: 13px;
      }

      #hint {
        position: absolute;
        right: 12px;
        bottom: 12px;
        padding: 8px 10px;
        background: var(--panel);
        border: 1px solid rgba(216, 241, 255, 0.2);
        border-radius: 8px;
        font-size: 12px;
      }

      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="hud"></div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.162.0/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
